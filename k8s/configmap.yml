apiVersion: v1
kind: ConfigMap
metadata:
  name: api-config
  labels:
    app: devops-api
data:
  NODE_ENV: 'production'
  PORT: '3000'
  CORS_ORIGIN: '*'
  RATE_LIMIT_WINDOW_MS: '900000'
  RATE_LIMIT_MAX: '100'
  LOG_LEVEL: 'info'
  DATABASE_URL: 'postgresql://postgres:postgres@postgres-service:5432/devops_api'
---
apiVersion: v1
kind: Secret
metadata:
  name: api-secrets
  labels:
    app: devops-api
type: Opaque
stringData:
  JWT_SECRET: 'k8s-jwt-secret-change-in-production-32+'
  JWT_REFRESH_SECRET: 'k8s-refresh-secret-change-in-production-32+'
  POSTGRES_PASSWORD: 'postgres'
